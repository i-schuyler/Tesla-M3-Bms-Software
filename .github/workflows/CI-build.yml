name: CI
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  build:
    name: build-linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Determine version guard mode
        id: changelog_gate
        shell: bash
        run: |
          set -euo pipefail

          changelog_changed=false
          base_sha=""
          head_sha="${GITHUB_SHA:-}"

          if [[ "${GITHUB_EVENT_NAME:-}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          elif [[ "${GITHUB_EVENT_NAME:-}" == "push" ]]; then
            base_sha="${{ github.event.before }}"
          fi

          if [[ -n "${base_sha}" && ! "${base_sha}" =~ ^0+$ ]] \
            && git cat-file -e "${base_sha}^{commit}" 2>/dev/null \
            && git cat-file -e "${head_sha}^{commit}" 2>/dev/null; then
            if git diff --name-only "${base_sha}" "${head_sha}" | grep -qx 'docs/CHANGELOG.md'; then
              changelog_changed=true
            fi
          else
            if git cat-file -e "${head_sha}^{commit}" 2>/dev/null \
              && git show --name-only --pretty='' "${head_sha}" | grep -qx 'docs/CHANGELOG.md'; then
              changelog_changed=true
            fi
          fi

          echo "changelog_changed=${changelog_changed}" >> "$GITHUB_OUTPUT"

      - name: Guard changelog/version consistency
        shell: bash
        run: |
          set -euo pipefail

          cmd=(python3 scripts/check_release_version_consistency.py)

          if [[ "${{ steps.changelog_gate.outputs.changelog_changed }}" == "true" ]]; then
            cmd+=(--require-changelog-match)
          fi

          "${cmd[@]}"

      - name: Install build package dependencies
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          sudo apt-get update
          sudo apt-get install gcc-arm-none-eabi

      - name: Build dependencies
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Number of processors:" `nproc`
          make get-deps -j `nproc`

      - name: Build stm32_m3bms firmware
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          make

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: stm32_m3bms firmware binary
          path: stm32_m3bms.bin

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: stm32_m3bms firmware hex
          path: stm32_m3bms.hex

      - name: Decide main auto-release eligibility
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: release_gate
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          should_release=false
          reason="docs/CHANGELOG.md not changed in pushed range"

          release_version="$(awk '/^#define VER[[:space:]]+/ {print $3; exit}' include/param_prj.h)"
          if [[ -z "${release_version}" ]]; then
            echo "ERROR: unable to parse firmware version from include/param_prj.h" >&2
            exit 1
          fi

          if [[ "${{ steps.changelog_gate.outputs.changelog_changed }}" == "true" ]]; then
            reason="eligible"

            if git ls-remote --tags --refs origin "refs/tags/${release_version}" | grep -q .; then
              reason="tag ${release_version} already exists"
            elif gh release view "${release_version}" >/dev/null 2>&1; then
              reason="release ${release_version} already exists"
            else
              should_release=true
            fi
          fi

          echo "release_version=${release_version}" >> "$GITHUB_OUTPUT"
          echo "should_release=${should_release}" >> "$GITHUB_OUTPUT"
          echo "reason=${reason}" >> "$GITHUB_OUTPUT"
          echo "[release-gate] ${reason}"

      - name: Create GitHub release from main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.release_gate.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${{ steps.release_gate.outputs.release_version }}" \
            stm32_m3bms.bin \
            stm32_m3bms.hex \
            --target "${GITHUB_SHA}" \
            --title "${{ steps.release_gate.outputs.release_version }}" \
            --generate-notes

      - name: Report release skip reason
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.release_gate.outputs.should_release != 'true'
        run: |
          echo "[release-gate] skipped: ${{ steps.release_gate.outputs.reason }}"
