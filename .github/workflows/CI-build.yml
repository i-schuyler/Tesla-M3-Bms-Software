name: CI
on:
  push:
    branches:
      - '**'
    tags:
      - '*'
  pull_request:

permissions:
  contents: write

jobs:
  build:
    name: build-linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Determine version guard mode
        id: version_guard_mode
        shell: bash
        run: |
          set -euo pipefail

          enforce_changelog_match=false
          tag_name=""

          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            enforce_changelog_match=true
            tag_name="${GITHUB_REF_NAME:-${GITHUB_REF#refs/tags/}}"
          else
            base_sha=""
            head_sha="${GITHUB_SHA:-}"

            if [[ "${GITHUB_EVENT_NAME:-}" == "pull_request" ]]; then
              base_sha="${{ github.event.pull_request.base.sha }}"
              head_sha="${{ github.event.pull_request.head.sha }}"
            elif [[ "${GITHUB_EVENT_NAME:-}" == "push" ]]; then
              base_sha="${{ github.event.before }}"
            fi

            if [[ -n "${base_sha}" && ! "${base_sha}" =~ ^0+$ ]] \
              && git cat-file -e "${base_sha}^{commit}" 2>/dev/null \
              && git cat-file -e "${head_sha}^{commit}" 2>/dev/null; then
              if git diff --name-only "${base_sha}" "${head_sha}" | grep -qx 'docs/CHANGELOG.md'; then
                enforce_changelog_match=true
              fi
            else
              if git cat-file -e "${GITHUB_SHA}^{commit}" 2>/dev/null \
                && git show --name-only --pretty='' "${GITHUB_SHA}" | grep -qx 'docs/CHANGELOG.md'; then
                enforce_changelog_match=true
              fi
            fi
          fi

          echo "enforce_changelog_match=${enforce_changelog_match}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"

      - name: Guard changelog/version/tag consistency
        shell: bash
        run: |
          set -euo pipefail

          cmd=(python3 scripts/check_release_version_consistency.py)

          if [[ "${{ steps.version_guard_mode.outputs.enforce_changelog_match }}" == "true" ]]; then
            cmd+=(--require-changelog-match)
          fi

          if [[ -n "${{ steps.version_guard_mode.outputs.tag_name }}" ]]; then
            cmd+=(--tag "${{ steps.version_guard_mode.outputs.tag_name }}")
          fi

          "${cmd[@]}"

      - name: Install build package dependencies
        run: |
          sudo apt-get update
          sudo apt-get install gcc-arm-none-eabi

      - name: Build dependencies
        run: |
          echo "Number of processors:" `nproc`
          make get-deps -j `nproc`

      - name: Build stm32_m3bms firmware
        run: |
          make

      - uses: actions/upload-artifact@v4
        with:
          name: stm32_m3bms firmware binary
          path: stm32_m3bms.bin

      - uses: actions/upload-artifact@v4
        with:
          name: stm32_m3bms firmware hex
          path: stm32_m3bms.hex

      - name: Publish release assets on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            stm32_m3bms.bin
            stm32_m3bms.hex
          fail_on_unmatched_files: true
          overwrite_files: false
